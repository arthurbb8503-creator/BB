<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Destaques 1 Tri Regional RN</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#00091F}
body{font-family:'Inter',sans-serif;position:fixed;inset:0}

.bg{
position:fixed;inset:0;
background:
radial-gradient(ellipse 80% 55% at 25% 20%,rgba(20,80,197,.55) 0%,transparent 60%),
radial-gradient(ellipse 60% 50% at 78% 82%,rgba(0,158,96,.18) 0%,transparent 65%),
linear-gradient(140deg,#00091F 0%,#001F5C 55%,#000A2A 100%);
z-index:0;
}

/* Overlay de inicio */
#overlay{
position:fixed;inset:0;z-index:100;
background:rgba(0,9,31,.96);
display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3vh;
}
#overlay.saindo{
animation:fadeOut .5s ease forwards;
}
#overlay.fora{display:none}
@keyframes fadeOut{to{opacity:0}}

.ov-eyebrow{font-family:‘Space Grotesk’,sans-serif;font-size:.8rem;letter-spacing:.45em;color:#E5B643;text-transform:uppercase}
.ov-titulo{font-weight:900;font-size:clamp(2.5rem,9vw,6rem);line-height:.88;letter-spacing:-.04em;
background:linear-gradient(180deg,#fff 0%,#B8D0FF 100%);
-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
text-align:center}
.ov-sub{font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.9rem,2vw,1.2rem);
letter-spacing:.3em;color:rgba(255,255,255,.85);text-transform:uppercase;text-align:center}
#btnPlay{
margin-top:1vh;
background:#fff;color:#001235;border:none;
padding:1.2rem 3.2rem;
font-family:‘Inter’,sans-serif;font-weight:900;font-size:1.05rem;letter-spacing:.2em;
text-transform:uppercase;border-radius:999px;cursor:pointer;
box-shadow:0 8px 32px rgba(20,80,197,.5);
}
#btnPlay:hover{background:#eef3ff}
#btnPlay:active{transform:scale(.97)}

/* Slides */
#slides{position:fixed;inset:0;z-index:10}

.slide{
position:absolute;inset:0;
display:flex;flex-direction:column;align-items:center;justify-content:center;
padding:6vh 6vw;
visibility:hidden;opacity:0;
}
.slide.visivel{visibility:visible;opacity:1}

/* INTRO */
.intro-label{
font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.7rem,1.4vw,.95rem);
letter-spacing:.45em;color:#E5B643;text-transform:uppercase;font-weight:500;
margin-bottom:2.5vh;
opacity:0;transform:translateY(8px);
}
.intro-main{
font-weight:900;font-size:clamp(3.5rem,14vw,11rem);line-height:.88;letter-spacing:-.045em;
background:linear-gradient(180deg,#fff 0%,#B8D0FF 100%);
-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
text-align:center;margin-bottom:3vh;
opacity:0;transform:translateY(16px) scale(1.04);filter:blur(12px);
}
.intro-linha{width:0;height:2px;background:#E5B643;margin:0 auto 3vh}
.intro-periodo{
font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.9rem,2vw,1.4rem);
letter-spacing:.32em;color:rgba(255,255,255,.95);text-transform:uppercase;
margin-bottom:4vh;text-align:center;
opacity:0;
}
.intro-regional{
font-size:clamp(.8rem,1.4vw,1rem);letter-spacing:.22em;
color:rgba(255,255,255,.7);text-transform:uppercase;font-weight:700;text-align:center;
opacity:0;
}
.intro-regional .verde{color:#00A86B}

.slide.visivel .intro-label{animation:subir .9s .1s cubic-bezier(.2,.8,.2,1) forwards}
.slide.visivel .intro-main{animation:surgir 1.4s .2s cubic-bezier(.2,.8,.2,1) forwards}
.slide.visivel .intro-linha{animation:crescer .9s 1s cubic-bezier(.2,.8,.2,1) forwards}
.slide.visivel .intro-periodo{animation:subir .9s 1.2s cubic-bezier(.2,.8,.2,1) forwards}
.slide.visivel .intro-regional{animation:subir .9s 1.4s cubic-bezier(.2,.8,.2,1) forwards}

@keyframes surgir{
0%{opacity:0;transform:translateY(16px) scale(1.04);filter:blur(12px)}
100%{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}
}
@keyframes subir{to{opacity:1;transform:translateY(0)}}
@keyframes crescer{to{width:clamp(80px,14vw,200px)}}

/* NOME */
.nome-num{position:absolute;top:6vh;left:6vw;font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.75rem,1.2vw,.9rem);letter-spacing:.32em;color:#E5B643;text-transform:uppercase;opacity:0}
.nome-label{position:absolute;top:6vh;right:6vw;font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.75rem,1.2vw,.9rem);letter-spacing:.45em;color:rgba(255,255,255,.5);text-transform:uppercase;opacity:0}
.nome-texto{
font-weight:900;font-size:clamp(2rem,calc(4.5vw + 2.5vh),7.5rem);
line-height:.95;letter-spacing:-.025em;text-align:center;max-width:92vw;
color:#fff;text-transform:uppercase;word-wrap:break-word;
opacity:0;filter:blur(22px);transform:scale(1.07);
text-shadow:0 0 50px rgba(184,208,255,.2);
}
.nome-barra{width:0;height:3px;background:#E5B643;margin-top:4vh;box-shadow:0 0 16px rgba(229,182,67,.4)}
.nome-sub{font-family:‘Space Grotesk’,sans-serif;font-size:clamp(.7rem,1.2vw,.9rem);letter-spacing:.42em;color:rgba(255,255,255,.6);text-transform:uppercase;margin-top:3vh;opacity:0;text-align:center}
.nome-glow{position:absolute;inset:0;background:radial-gradient(ellipse 55% 45% at center,rgba(184,208,255,.15) 0%,transparent 70%);opacity:0;pointer-events:none}

.slide.visivel .nome-num{animation:aparecer .6s .35s ease forwards}
.slide.visivel .nome-label{animation:aparecer .6s .5s ease forwards}
.slide.visivel .nome-texto{animation:explodir 1s cubic-bezier(.15,.85,.2,1) forwards}
.slide.visivel .nome-barra{animation:crescer2 .7s .65s cubic-bezier(.2,.8,.2,1) forwards}
.slide.visivel .nome-sub{animation:aparecer .8s .9s ease forwards}
.slide.visivel .nome-glow{animation:brilho 1.2s ease forwards}

@keyframes explodir{
0%{opacity:0;transform:scale(1.07);filter:blur(22px)}
55%{opacity:1}
100%{opacity:1;transform:scale(1);filter:blur(0)}
}
@keyframes aparecer{to{opacity:1}}
@keyframes crescer2{to{width:clamp(120px,22vw,320px)}}
@keyframes brilho{
0%{opacity:0;transform:scale(.88)}
40%{opacity:.85;transform:scale(1.04)}
100%{opacity:.45;transform:scale(1)}
}

/* Barra de progresso */
#barra{
position:fixed;bottom:0;left:0;height:3px;width:0;z-index:50;
background:linear-gradient(90deg,#E5B643,#FFD978);
box-shadow:0 0 10px rgba(229,182,67,.6);
display:none;
}

/* Botao reiniciar */
#btnReiniciar{
position:fixed;bottom:5vh;left:50%;transform:translateX(-50%);
z-index:60;display:none;
background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.25);
color:rgba(255,255,255,.85);padding:.75rem 1.8rem;
font-family:‘Space Grotesk’,sans-serif;font-size:.75rem;letter-spacing:.25em;
text-transform:uppercase;border-radius:999px;cursor:pointer;
}
#btnReiniciar.visivel{display:block}

.marca{position:fixed;bottom:4vh;right:4vw;z-index:20;font-family:‘Space Grotesk’,sans-serif;font-size:.65rem;letter-spacing:.35em;color:rgba(255,255,255,.25);text-transform:uppercase;pointer-events:none}
</style>

</head>
<body>

<div class="bg"></div>

<div id="slides">
  <!-- slide 0: intro, criado fixo no HTML -->
  <div class="slide" id="s0">
    <div class="intro-label">Reconhecimento</div>
    <div class="intro-main">DESTAQUES</div>
    <div class="intro-linha"></div>
    <div class="intro-periodo">1 Trimestre &middot; 2026</div>
    <div class="intro-regional">Regional <span class="verde">Rio Grande do Norte</span></div>
  </div>
  <!-- slides de nome injetados pelo JS -->
</div>

<div id="barra"></div>
<button id="btnReiniciar">&#8635; Reiniciar</button>
<div class="marca">RN &middot; 2026</div>

<div id="overlay">
  <div class="ov-eyebrow">Reconhecimento</div>
  <div class="ov-titulo">DESTAQUES</div>
  <div class="ov-sub">1&ordm; Trimestre &middot; 2026 &middot; Regional RN</div>
  <button id="btnPlay">&#9654;&nbsp;&nbsp;INICIAR</button>
</div>

<script>
var NOMES = [
  "JOSE PETRUCIO RODRIGUES DE AZEVEDO",
  "SHEYLA PATRICIA DA SILVA CORTES AMORIM",
  "LEILA JANAINA RIBEIRO OLIVEIRA",
  "JAISA SOUZA DE ALCANIZ",
  "PAULO RICARDO DE OLIVEIRA",
  "LEINA SUELLY GARCIA WATHIER",
  "NAYARA BRUNA FELIX SILVA DE SOUSA",
  "ALEXANDRE DISRAELLE FERNANDES DA SILVA",
  "ARICIA MORAIS DE MEDEIROS"
];

var DURACAO = 7000; // ms por slide

// Injeta slides de nome
var slidesEl = document.getElementById('slides');
for (var i = 0; i < NOMES.length; i++) {
  var n = i + 1;
  var num = (n < 10 ? '0' + n : '' + n);
  var tot = (NOMES.length < 10 ? '0' + NOMES.length : '' + NOMES.length);
  var div = document.createElement('div');
  div.className = 'slide';
  div.id = 's' + n;
  div.innerHTML =
    '<div class="nome-glow"></div>' +
    '<div class="nome-num">' + num + ' / ' + tot + '</div>' +
    '<div class="nome-label">Destaque</div>' +
    '<div class="nome-texto">' + NOMES[i] + '</div>' +
    '<div class="nome-barra"></div>' +
    '<div class="nome-sub">1&ordm; Trimestre &middot; 2026</div>';
  slidesEl.appendChild(div);
}

var total = NOMES.length + 1; // intro + nomes
var cur = 0;
var tmr = null;
var rafId = null;
var playing = false;
var t0 = 0;

var barraEl = document.getElementById('barra');
var btnReiniciarEl = document.getElementById('btnReiniciar');
var overlayEl = document.getElementById('overlay');

function getSlide(i) {
  return document.getElementById('s' + i);
}

// Mostra um slide: remove visivel de todos, recria o nó pra forcar reinicio de animacao
function mostrarSlide(idx) {
  for (var j = 0; j < total; j++) {
    var s = getSlide(j);
    if (s) s.classList.remove('visivel');
  }
  var alvo = getSlide(idx);
  if (!alvo) return;
  // Forcar reflow no proprio elemento para reiniciar animacoes dos filhos
  alvo.classList.remove('visivel');
  alvo.style.display = 'none';
  void alvo.offsetHeight; // flush
  alvo.style.display = '';
  void alvo.offsetHeight; // flush novamente
  alvo.classList.add('visivel');
}

function tick() {
  if (!playing) return;
  var elapsed = Date.now() - t0;
  var pct = Math.min(100, (elapsed / DURACAO) * 100);
  barraEl.style.width = pct + '%';
  if (elapsed < DURACAO) {
    rafId = requestAnimationFrame(tick);
  }
}

function iniciarTimer() {
  if (tmr) clearTimeout(tmr);
  if (rafId) cancelAnimationFrame(rafId);
  t0 = Date.now();
  barraEl.style.width = '0%';
  barraEl.style.display = 'block';
  tick();
  tmr = setTimeout(avancar, DURACAO);
}

function avancar() {
  cur++;
  if (cur >= total) {
    // Fim: volta pro intro e para
    playing = false;
    if (tmr) clearTimeout(tmr);
    if (rafId) cancelAnimationFrame(rafId);
    barraEl.style.display = 'none';
    mostrarSlide(0);
    btnReiniciarEl.classList.add('visivel');
    return;
  }
  mostrarSlide(cur);
  iniciarTimer();
}

function iniciar() {
  // Esconde overlay
  overlayEl.classList.add('saindo');
  setTimeout(function() { overlayEl.classList.add('fora'); }, 520);

  btnReiniciarEl.classList.remove('visivel');
  cur = 0;
  playing = true;

  mostrarSlide(0);
  iniciarTimer();
}

document.getElementById('btnPlay').addEventListener('click', function() {
  iniciar();
});

document.getElementById('btnReiniciar').addEventListener('click', function() {
  overlayEl.classList.remove('saindo', 'fora');
  void overlayEl.offsetHeight;
  overlayEl.classList.add('saindo');
  setTimeout(function() { overlayEl.classList.add('fora'); }, 10);
  btnReiniciarEl.classList.remove('visivel');
  cur = 0;
  playing = true;
  mostrarSlide(0);
  iniciarTimer();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'ArrowRight' && playing) {
    if (tmr) clearTimeout(tmr);
    if (rafId) cancelAnimationFrame(rafId);
    avancar();
  } else if ((e.key === 'r' || e.key === 'R') && !playing) {
    document.getElementById('btnReiniciar').click();
  }
});
</script>

</body>
</html>
